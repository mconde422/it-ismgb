<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT-ISMGB — Mes Tâches</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/forms.css" />
  <link rel="stylesheet" href="css/kanban.css" />
</head>
<body>

<!-- Page Loader -->
<div id="page-loader" class="page-loader"><div class="spinner"></div></div>
<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>
<!-- Sidebar Overlay -->

<div class="app-shell">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <a href="my-tasks.html" class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg viewBox="0 0 24 24" fill="white"><path d="M20 3H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1zm-1 12H5V5h14v10zm-2 4H7v2h10v-2z"/></svg>
      </div>
      <div class="sidebar-logo-text">
        <span class="sidebar-logo-title">IT-ISMGB</span>
        <span class="sidebar-logo-sub">Service Informatique</span>
      </div>
    </a>

    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="sidebar-section-label">Principal</div>
        <a href="my-tasks.html" class="nav-item active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Mes tâches
        </a>
        <a href="groups.html" class="nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Mes groupes
        </a>
        <a href="search.html" class="nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Recherche
        </a>
      </div>

      <div class="sidebar-section" data-admin-only style="display:none">
        <div class="sidebar-section-label">Administration</div>
        <a href="dashboard.html" class="nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="admin.html" class="nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Administration
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user-avatar" id="sidebar-user-avatar">?</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="sidebar-user-name">Chargement…</div>
        <div class="sidebar-user-role" id="sidebar-user-role">Membre</div>
      </div>
      <button class="sidebar-logout" data-logout title="Déconnexion">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <header class="header">
      <button class="sidebar-toggle" id="sidebar-toggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="header-breadcrumb">
        <span class="breadcrumb-item current">Mes tâches</span>
      </div>
      <div class="header-search">
        <input type="search" class="header-search-input" id="header-search" placeholder="Rechercher…" />
      </div>
      <div class="header-actions">
        <button class="header-btn" data-theme-toggle onclick="toggleThemePage()" title="Changer le thème">
          <span data-theme-icon="sun"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>
          <span data-theme-icon="moon" style="display:none"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
        </button>
        <div class="header-avatar" id="header-avatar" title="">?</div>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Mes tâches</h1>
          <p class="page-subtitle">Tâches privées assignées à vous</p>
        </div>
        <button class="btn btn-primary" onclick="openNewTaskModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouvelle tâche
        </button>
      </div>

      <!-- KPI Bar -->
      <div class="kpi-bar" id="kpi-bar">
        <div class="kpi-chip"><span class="kpi-chip-dot" style="background:var(--status-todo)"></span> À faire <strong class="kpi-chip-count" id="kpi-todo">0</strong></div>
        <div class="kpi-chip"><span class="kpi-chip-dot" style="background:var(--status-in-progress)"></span> En cours <strong class="kpi-chip-count" id="kpi-in-progress">0</strong></div>
        <div class="kpi-chip"><span class="kpi-chip-dot" style="background:var(--status-blocked)"></span> Bloqué <strong class="kpi-chip-count" id="kpi-blocked">0</strong></div>
        <div class="kpi-chip"><span class="kpi-chip-dot" style="background:var(--status-done)"></span> Terminé <strong class="kpi-chip-count" id="kpi-done">0</strong></div>
      </div>

      <!-- Filters & View Toggle -->
      <div class="filters-bar">
        <span class="filter-label">Filtrer</span>
        <select id="filter-status" onchange="applyFilters()">
          <option value="">Tous statuts</option>
          <option value="todo">À faire</option>
          <option value="in_progress">En cours</option>
          <option value="blocked">Bloqué</option>
          <option value="done">Terminé</option>
        </select>
        <select id="filter-priority" onchange="applyFilters()">
          <option value="">Toutes priorités</option>
          <option value="critical">Critique</option>
          <option value="high">Haute</option>
          <option value="normal">Normale</option>
          <option value="low">Basse</option>
        </select>
        <select id="filter-category" onchange="applyFilters()">
          <option value="">Toutes catégories</option>
          <option value="reseau">Réseau</option>
          <option value="materiel">Matériel</option>
          <option value="logiciel">Logiciel</option>
          <option value="maintenance">Maintenance</option>
          <option value="graphisme">Graphisme</option>
        </select>
        <select id="filter-sort" onchange="applyFilters()">
          <option value="created_at">Date création</option>
          <option value="due_date">Date échéance</option>
          <option value="priority">Priorité</option>
          <option value="status">Statut</option>
        </select>
        <div class="view-toggle">
          <button class="view-toggle-btn active" id="view-list-btn" onclick="switchView('list')" title="Vue liste">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
          <button class="view-toggle-btn" id="view-kanban-btn" onclick="switchView('kanban')" title="Vue Kanban">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="11" rx="1"/></svg>
          </button>
        </div>
      </div>

      <!-- Task List View -->
      <div id="tasks-list-view">
        <div id="tasks-list" style="display:flex;flex-direction:column;gap:0.625rem"></div>
      </div>

      <!-- Kanban View -->
      <div id="tasks-kanban-view" style="display:none">
        <div id="kanban-container"></div>
      </div>
    </main>
  </div>
</div>

<!-- ============================================
     MODAL: Nouvelle / Éditer tâche
     ============================================ -->
<div class="modal-backdrop" id="task-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 class="modal-title" id="task-modal-title">Nouvelle tâche</h2>
      <button class="modal-close" onclick="closeTaskModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="task-form" novalidate>
        <input type="hidden" id="task-id-field" />
        <div class="form-group">
          <label class="form-label" for="task-title">Titre <span class="required">*</span></label>
          <input type="text" id="task-title" class="form-input" placeholder="Ex: Configurer le routeur de la salle B" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="task-desc">Description</label>
          <textarea id="task-desc" class="form-textarea" placeholder="Description détaillée de la tâche…" rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="task-category">Catégorie <span class="required">*</span></label>
            <select id="task-category" class="form-select" required>
              <option value="">Choisir…</option>
              <option value="reseau">Réseau</option>
              <option value="materiel">Matériel</option>
              <option value="logiciel">Logiciel</option>
              <option value="maintenance">Maintenance</option>
              <option value="graphisme">Graphisme</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="task-priority">Priorité <span class="required">*</span></label>
            <select id="task-priority" class="form-select" required>
              <option value="normal" selected>Normale</option>
              <option value="critical">Critique</option>
              <option value="high">Haute</option>
              <option value="low">Basse</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="task-status">Statut <span class="required">*</span></label>
            <select id="task-status" class="form-select" required>
              <option value="todo" selected>À faire</option>
              <option value="in_progress">En cours</option>
              <option value="blocked">Bloqué</option>
              <option value="done">Terminé</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="task-due">Date d'échéance</label>
            <input type="date" id="task-due" class="form-input" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="task-tags">Tags</label>
          <input type="text" id="task-tags" class="form-input" placeholder="Ex: vpn, urgent, bureau-A (séparés par virgule)" />
          <span class="form-hint">Séparer les tags par une virgule</span>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeTaskModal()">Annuler</button>
      <button class="btn btn-primary" id="task-submit-btn" data-loading-text="Enregistrement…" onclick="submitTask()">
        Créer la tâche
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@16/dist/iife/sdk.min.js"></script>
<script type="module">
  import { initTheme, toggleTheme } from './js/theme.js';
  import { requireAuth, populateSidebarUser, initLogoutBtn } from './js/auth.js';
  import { initSidebar, initHeaderSearch, showToast, openModal, closeModal, renderTaskCard, renderKanbanBoard, renderEmptyState, confirmDialog, setButtonLoading, validateForm } from './js/ui.js';
  import { getMyTasks, createTask, updateTask, deleteTask, changeTaskStatus } from './js/tasks.js';
  import { filterTasks, sortTasks } from './js/search.js';
  import { hidePageLoader } from './js/ui.js';
  import { isOverdue } from './js/utils.js';

  window.toggleThemePage = toggleTheme;

  let currentUser = null;
  let allTasks    = [];
  let currentView = 'list';

  async function init() {
    initTheme();
    initSidebar();
    initHeaderSearch();
    initLogoutBtn();

    currentUser = await requireAuth();
    if (!currentUser) return;

    populateSidebarUser(currentUser);
    await loadTasks();
    hidePageLoader();
  }

  async function loadTasks() {
    try {
      allTasks = await getMyTasks(currentUser.$id);
      renderAll();
    } catch (err) {
      showToast('Erreur lors du chargement des tâches', 'error');
    }
  }

  function renderAll() {
    const filters = {
      status  : document.getElementById('filter-status').value,
      priority: document.getElementById('filter-priority').value,
      category: document.getElementById('filter-category').value,
    };
    const sortBy  = document.getElementById('filter-sort').value;
    const sorted  = sortTasks(filterTasks(allTasks, filters), sortBy);

    // KPI
    document.getElementById('kpi-todo').textContent       = allTasks.filter(t=>t.status==='todo').length;
    document.getElementById('kpi-in-progress').textContent= allTasks.filter(t=>t.status==='in_progress').length;
    document.getElementById('kpi-blocked').textContent    = allTasks.filter(t=>t.status==='blocked').length;
    document.getElementById('kpi-done').textContent       = allTasks.filter(t=>t.status==='done').length;

    if (currentView === 'list') renderListView(sorted);
    else renderKanbanView(sorted);
  }

  function renderListView(tasks) {
    const el = document.getElementById('tasks-list');
    if (!tasks.length) {
      el.innerHTML = renderEmptyState('📋', 'Aucune tâche', 'Créez votre première tâche pour commencer.', '+ Nouvelle tâche', 'openNewTaskModal()');
      return;
    }
    el.innerHTML = tasks.map(t => renderTaskCard(t)).join('');
  }

  function renderKanbanView(tasks) {
    renderKanbanBoard(tasks, 'kanban-container', {
      onMove: async (taskId, newStatus) => {
        try {
          const task = allTasks.find(t => t.$id === taskId);
          if (!task || task.status === newStatus) return;
          await changeTaskStatus(taskId, newStatus, task.status, currentUser);
          task.status = newStatus;
          renderAll();
          showToast('Statut mis à jour', 'success');
        } catch {
          showToast('Erreur lors du changement de statut', 'error');
          renderAll();
        }
      }
    });
  }

  // ---- View switch ----
  window.switchView = (view) => {
    currentView = view;
    document.getElementById('tasks-list-view').style.display   = view === 'list'   ? '' : 'none';
    document.getElementById('tasks-kanban-view').style.display = view === 'kanban' ? '' : 'none';
    document.getElementById('view-list-btn').classList.toggle('active', view === 'list');
    document.getElementById('view-kanban-btn').classList.toggle('active', view === 'kanban');
    renderAll();
  };

  // ---- Filters ----
  window.applyFilters = renderAll;

  // ---- Modal: open new task ----
  window.openNewTaskModal = () => {
    document.getElementById('task-id-field').value = '';
    document.getElementById('task-form').reset();
    document.getElementById('task-modal-title').textContent = 'Nouvelle tâche';
    document.getElementById('task-submit-btn').textContent  = 'Créer la tâche';
    openModal('task-modal');
  };

  window.closeTaskModal = () => closeModal('task-modal');

  // ---- Edit task ----
  window.editTask = (taskId) => {
    const task = allTasks.find(t => t.$id === taskId);
    if (!task) return;

    document.getElementById('task-id-field').value = taskId;
    document.getElementById('task-title').value    = task.title;
    document.getElementById('task-desc').value     = task.description || '';
    document.getElementById('task-category').value = task.category;
    document.getElementById('task-priority').value = task.priority;
    document.getElementById('task-status').value   = task.status;
    document.getElementById('task-tags').value     = (task.tags || []).join(', ');
    if (task.due_date) document.getElementById('task-due').value = task.due_date.slice(0,10);

    document.getElementById('task-modal-title').textContent = 'Modifier la tâche';
    document.getElementById('task-submit-btn').textContent  = 'Enregistrer';
    openModal('task-modal');
  };

  // ---- Submit (create or update) ----
  window.submitTask = async () => {
    const form = document.getElementById('task-form');
    if (!validateForm(form)) return;

    const btn    = document.getElementById('task-submit-btn');
    const taskId = document.getElementById('task-id-field').value;
    const data   = {
      title      : document.getElementById('task-title').value.trim(),
      description: document.getElementById('task-desc').value.trim(),
      category   : document.getElementById('task-category').value,
      priority   : document.getElementById('task-priority').value,
      status     : document.getElementById('task-status').value,
      visibility : 'private',
      due_date   : document.getElementById('task-due').value || null,
      tags       : document.getElementById('task-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    };

    setButtonLoading(btn, true);
    try {
      if (taskId) {
        await updateTask(taskId, data, currentUser);
        showToast('Tâche mise à jour', 'success');
      } else {
        await createTask(data, currentUser);
        showToast('Tâche créée avec succès', 'success');
      }
      closeModal('task-modal');
      await loadTasks();
    } catch (err) {
      showToast(err?.message || 'Erreur lors de la sauvegarde', 'error');
    } finally {
      setButtonLoading(btn, false);
    }
  };

  // ---- Delete ----
  window.deleteTaskUI = (taskId, taskTitle) => {
    confirmDialog(
      `Supprimer la tâche "${taskTitle}" ? Cette action est irréversible.`,
      async () => {
        try {
          await deleteTask(taskId, currentUser);
          allTasks = allTasks.filter(t => t.$id !== taskId);
          renderAll();
          showToast('Tâche supprimée', 'success');
        } catch {
          showToast('Erreur lors de la suppression', 'error');
        }
      }
    );
  };

  // ---- Quick add from kanban ----
  window.quickAddTask = (status) => {
    document.getElementById('task-status').value = status;
    openNewTaskModal();
  };

  init();
</script>

</body>
</html>
