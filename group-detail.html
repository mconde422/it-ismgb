<!-- Modal: Task for group -->
<div class="modal-backdrop" id="group-task-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 class="modal-title" id="group-task-modal-title">Nouvelle tâche de groupe</h2>
      <button class="modal-close" onclick="closeModal('group-task-modal')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="group-task-form" novalidate>
        <input type="hidden" id="gt-id" />
        <div class="form-group">
          <label class="form-label" for="gt-title">Titre <span class="required">*</span></label>
          <input type="text" id="gt-title" class="form-input" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="gt-desc">Description</label>
          <textarea id="gt-desc" class="form-textarea" rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="gt-category">Catégorie <span class="required">*</span></label>
            <select id="gt-category" class="form-select" required>
              <option value="">Choisir…</option>
              <option value="reseau">Réseau</option>
              <option value="materiel">Matériel</option>
              <option value="logiciel">Logiciel</option>
              <option value="maintenance">Maintenance</option>
              <option value="graphisme">Graphisme</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="gt-priority">Priorité <span class="required">*</span></label>
            <select id="gt-priority" class="form-select" required>
              <option value="normal" selected>Normale</option>
              <option value="critical">Critique</option>
              <option value="high">Haute</option>
              <option value="low">Basse</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="gt-status">Statut <span class="required">*</span></label>
            <select id="gt-status" class="form-select" required>
              <option value="todo" selected>À faire</option>
              <option value="in_progress">En cours</option>
              <option value="blocked">Bloqué</option>
              <option value="done">Terminé</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="gt-due">Date d'échéance</label>
            <input type="date" id="gt-due" class="form-input" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="gt-assignee">Assigner à</label>
          <select id="gt-assignee" class="form-select">
            <option value="">Non assigné</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="gt-tags">Tags</label>
          <input type="text" id="gt-tags" class="form-input" placeholder="tags séparés par virgule" />
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('group-task-modal')">Annuler</button>
      <button class="btn btn-primary" id="gt-submit-btn" data-loading-text="Enregistrement…" onclick="submitGroupTask()">

<script src="https://cdn.jsdelivr.net/npm/appwrite@16/dist/iife/sdk.min.js"></script>
<script type="module">
  import { initTheme, toggleTheme } from './js/theme.js';
  import { requireAuth, populateSidebarUser, isAdmin, initLogoutBtn } from './js/auth.js';
  import { initSidebar, initHeaderSearch, showToast, openModal, closeModal, renderTaskCard, renderKanbanBoard, renderActivityLog, renderEmptyState, confirmDialog, setButtonLoading, validateForm, renderMemberAvatar } from './js/ui.js';
  import { getGroupTasks, createTask, updateTask, deleteTask, changeTaskStatus } from './js/tasks.js';
  import { getWorkspaceById, inviteMemberByEmail, removeMember } from './js/workspaces.js';
  import { getWorkspaceActivity } from './js/activity.js';
  import { subscribeToGroupTasks, unsubscribeAll } from './js/realtime.js';
  import { filterTasks, sortTasks } from './js/search.js';
  import { hidePageLoader } from './js/ui.js';
  import { escapeHtml, stringToColor, getInitials, getUrlParam } from './js/utils.js';

  window.toggleThemePage = toggleTheme;
  window.openModal  = openModal;
  window.closeModal = closeModal;

  let currentUser = null;
  let workspace   = null;
  let allTasks    = [];
  let currentView = 'list';
  let currentTab  = 'tasks';
  const workspaceId = getUrlParam('id');

  async function init() {
    initTheme();
    initSidebar();
    initHeaderSearch();
    initLogoutBtn();

    if (!workspaceId) { window.location.href = 'groups.html'; return; }

    currentUser = await requireAuth();
    if (!currentUser) return;
    populateSidebarUser(currentUser);

    await Promise.all([loadWorkspace(), loadTasks()]);
    setupRealtime();
    hidePageLoader();
  }

  async function loadWorkspace() {
    workspace = await getWorkspaceById(workspaceId);
    if (!workspace) { window.location.href = 'groups.html'; return; }

    document.title = `IT-ISMGB — ${workspace.name}`;
    document.getElementById('breadcrumb-name').textContent = workspace.name;
    document.getElementById('group-name-display').textContent = workspace.name;
    document.getElementById('group-desc-display').textContent = workspace.description || '';
    const iconEl = document.getElementById('group-icon-display');
    iconEl.textContent = workspace.icon || '💻';
    iconEl.style.background = (workspace.color||'#2F81F7') + '22';

    // Members avatars
    const shown = workspace.members.slice(0,5);
    const extra = workspace.members.length - shown.length;
    document.getElementById('group-members-avatars').innerHTML =
      shown.map(id => `<div class="member-avatar" style="background:${stringToColor(id)};border:2px solid var(--bg-secondary)">${id.slice(0,2).toUpperCase()}</div>`).join('') +
      (extra > 0 ? `<div class="member-avatar member-avatar-more">+${extra}</div>` : '');

    document.getElementById('tab-member-count').textContent = workspace.members.length;

    const canManage = workspace.created_by === currentUser.$id || isAdmin(currentUser);
    if (canManage) document.getElementById('invite-btn').style.display = '';

    populateAssigneeSelect();
  }

  function populateAssigneeSelect() {
    const sel = document.getElementById('gt-assignee');
    sel.innerHTML = '<option value="">Non assigné</option>' +
      (workspace.members || []).map(id =>
        `<option value="${id}">${id === currentUser.$id ? 'Moi (' + currentUser.name + ')' : id.slice(0,8)+'…'}</option>`
      ).join('');
  }

  async function loadTasks() {
    allTasks = await getGroupTasks(workspaceId);
    document.getElementById('tab-task-count').textContent = allTasks.length;
    applyGroupFilters();
  }

  function applyGroupFiltersLocal() {
    const filters = {
      status  : document.getElementById('g-filter-status').value,
      priority: document.getElementById('g-filter-priority').value,
      category: document.getElementById('g-filter-category').value,
    };
    const sorted = sortTasks(filterTasks(allTasks, filters));
    if (currentView === 'list') renderListView(sorted);
    else renderKanbanViewFn(sorted);
  }

  window.applyGroupFilters = applyGroupFiltersLocal;

  function renderListView(tasks) {
    const el = document.getElementById('group-tasks-list');
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
    el.style.gap = '0.625rem';
    document.getElementById('group-kanban-container').style.display = 'none';
    if (!tasks.length) {
      el.innerHTML = renderEmptyState('📋','Aucune tâche','Ajoutez la première tâche à ce groupe.','+ Nouvelle tâche','openGroupTaskModal()');
      return;
    }
    el.innerHTML = tasks.map(t => renderTaskCard(t)).join('');
  }

  function renderKanbanViewFn(tasks) {
    document.getElementById('group-tasks-list').style.display = 'none';
    const container = document.getElementById('group-kanban-container');
    container.style.display = '';
    renderKanbanBoard(tasks, 'group-kanban-container', {
      onMove: async (taskId, newStatus) => {
        const task = allTasks.find(t => t.$id === taskId);
        if (!task || task.status === newStatus) return;
        try {
          await changeTaskStatus(taskId, newStatus, task.status, currentUser);
          task.status = newStatus;
          applyGroupFiltersLocal();
          showToast('Statut mis à jour', 'success');
        } catch { showToast('Erreur', 'error'); applyGroupFiltersLocal(); }
      }
    });
  }

  window.switchView = (view) => {
    currentView = view;
    document.getElementById('g-view-list').classList.toggle('active', view === 'list');
    document.getElementById('g-view-kanban').classList.toggle('active', view === 'kanban');
    applyGroupFiltersLocal();
  };

  window.switchTab = async (tab) => {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`tab-${tab}`)?.classList.add('active');

    if (tab === 'members') renderMembersTab();
    if (tab === 'activity') await loadActivityTab();
  };

  function renderMembersTab() {
    const el = document.getElementById('members-list');
    if (!workspace) return;
    const canManage = workspace.created_by === currentUser.$id || isAdmin(currentUser);
    el.innerHTML = workspace.members.map(id => {
      const isOwner = id === workspace.created_by;
      const isMe    = id === currentUser.$id;
      const color   = stringToColor(id);
      const initials = id.slice(0,2).toUpperCase();
      return `
        <div class="d-flex items-center gap-3" style="padding:0.75rem 1rem;background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-sm)">
          <div class="avatar avatar-md" style="background:${color}">${initials}</div>
          <div style="flex:1">
            <div class="text-sm font-semibold">${isMe ? currentUser.name+' (vous)' : id.slice(0,8)+'…'}</div>
            <div class="text-xs text-secondary">${isOwner ? 'Propriétaire' : 'Membre'}</div>
          </div>
          ${isOwner ? '<span class="badge badge-owner">Owner</span>' : '<span class="badge badge-member">Membre</span>'}
          ${canManage && !isOwner && !isMe ? `
            <button class="btn btn-ghost btn-sm" onclick="removeMemberUI('${id}')" style="color:var(--accent-danger)">Retirer</button>
          ` : ''}
        </div>
      `;
    }).join('');
  }

  async function loadActivityTab() {
    const { getWorkspaceActivity } = await import('./js/activity.js');
    const logs = await getWorkspaceActivity(workspaceId);
    const el = document.getElementById('activity-list');
    if (!logs.length) {
      el.innerHTML = '<p class="text-secondary text-sm p-4">Aucune activité enregistrée.</p>';
      return;
    }
    el.innerHTML = logs.map(log => renderActivityLog(log)).join('');
  }

  // ---- Realtime ----
  function setupRealtime() {
    subscribeToGroupTasks(workspaceId, currentUser.$id, {
      onUpdate: async (task, event) => {
        if (event === 'create') allTasks.unshift(task);
        else if (event === 'update') {
          const idx = allTasks.findIndex(t => t.$id === task.$id);
          if (idx !== -1) allTasks[idx] = task;
        }
        document.getElementById('tab-task-count').textContent = allTasks.length;
        applyGroupFiltersLocal();
      },
      onDelete: (task) => {
        allTasks = allTasks.filter(t => t.$id !== task.$id);
        document.getElementById('tab-task-count').textContent = allTasks.length;
        applyGroupFiltersLocal();
      }
    });
  }

  // ---- Group task modal ----
  window.openGroupTaskModal = () => {
    document.getElementById('gt-id').value = '';
    document.getElementById('group-task-form').reset();
    document.getElementById('group-task-modal-title').textContent = 'Nouvelle tâche de groupe';
    document.getElementById('gt-submit-btn').textContent = 'Créer la tâche';
    openModal('group-task-modal');
  };

  window.editTask = (taskId) => {
    const task = allTasks.find(t => t.$id === taskId);
    if (!task) return;
    document.getElementById('gt-id').value       = taskId;
    document.getElementById('gt-title').value    = task.title;
    document.getElementById('gt-desc').value     = task.description || '';
    document.getElementById('gt-category').value = task.category;
    document.getElementById('gt-priority').value = task.priority;
    document.getElementById('gt-status').value   = task.status;
    document.getElementById('gt-tags').value     = (task.tags||[]).join(', ');
    if (task.due_date) document.getElementById('gt-due').value = task.due_date.slice(0,10);
    document.getElementById('gt-assignee').value = task.assignee_id || '';
    document.getElementById('group-task-modal-title').textContent = 'Modifier la tâche';
    document.getElementById('gt-submit-btn').textContent = 'Enregistrer';
    openModal('group-task-modal');
  };

  window.submitGroupTask = async () => {
    const form = document.getElementById('group-task-form');
    if (!validateForm(form)) return;
    const btn    = document.getElementById('gt-submit-btn');
    const taskId = document.getElementById('gt-id').value;
    const assigneeId = document.getElementById('gt-assignee').value;
    const data = {
      title        : document.getElementById('gt-title').value.trim(),
      description  : document.getElementById('gt-desc').value.trim(),
      category     : document.getElementById('gt-category').value,
      priority     : document.getElementById('gt-priority').value,
      status       : document.getElementById('gt-status').value,
      visibility   : 'group',
      workspace_id : workspaceId,
      assignee_id  : assigneeId || null,
      assignee_name: assigneeId === currentUser.$id ? currentUser.name : (assigneeId ? assigneeId.slice(0,8) : null),
      due_date     : document.getElementById('gt-due').value || null,
      tags         : document.getElementById('gt-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    };
    setButtonLoading(btn, true);
    try {
      if (taskId) {
        await updateTask(taskId, data, currentUser);
        const idx = allTasks.findIndex(t => t.$id === taskId);
        if (idx !== -1) allTasks[idx] = { ...allTasks[idx], ...data };
        showToast('Tâche mise à jour','success');
      } else {
        const created = await createTask(data, currentUser);
        allTasks.unshift(created);
        showToast('Tâche créée','success');
      }
      document.getElementById('tab-task-count').textContent = allTasks.length;
      closeModal('group-task-modal');
      applyGroupFiltersLocal();
    } catch (err) {
      showToast(err?.message || 'Erreur','error');
    } finally { setButtonLoading(btn, false); }
  };

  window.deleteTaskUI = (taskId, taskTitle) => {
    confirmDialog(`Supprimer "${taskTitle}" ?`, async () => {
      try {
        await deleteTask(taskId, currentUser);
        allTasks = allTasks.filter(t => t.$id !== taskId);
        document.getElementById('tab-task-count').textContent = allTasks.length;
        applyGroupFiltersLocal();
        showToast('Tâche supprimée','success');
      } catch { showToast('Erreur lors de la suppression','error'); }
    });
  };

  window.openInviteModal = () => {
    document.getElementById('invite-email').value = '';
    openModal('invite-modal');
  };

  window.submitInvite = async () => {
    const email = document.getElementById('invite-email').value.trim();
    if (!email) { showToast('Veuillez entrer un email','error'); return; }
    const btn = document.getElementById('invite-submit-btn');
    setButtonLoading(btn, true);
    try {
      await inviteMemberByEmail(workspaceId, email, workspace);
      workspace.pending_invites = [...(workspace.pending_invites||[]), email];
      closeModal('invite-modal');
      showToast(`Invitation envoyée à ${email}`,'success');
    } catch (err) {
      showToast(err?.message || 'Erreur','error');
    } finally { setButtonLoading(btn, false); }
  };

  window.removeMemberUI = (memberId) => {
    confirmDialog('Retirer ce membre du groupe ?', async () => {
      try {
        await removeMember(workspaceId, memberId, workspace);
        workspace.members = workspace.members.filter(id => id !== memberId);
        renderMembersTab();
        showToast('Membre retiré','success');
      } catch (err) { showToast(err?.message || 'Erreur','error'); }
    }, 'Retirer le membre');
  };

  window.quickAddTask = (status) => {
    document.getElementById('gt-status').value = status;
    openGroupTaskModal();
  };

  window.addEventListener('unload', unsubscribeAll);
  init();
</script>
</body>
</html>
