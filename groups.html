  <div class="main-content">

      </div>

      <div class="header-actions">
        <button class="header-btn" onclick="toggleThemePage()" title="Thème">
          <span data-theme-icon="sun"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>
          <span data-theme-icon="moon" style="display:none"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>

    <main class="page-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Mes groupes</h1>
          <p class="page-subtitle">Groupes de travail dont vous êtes membre</p>
        </div>
        <button class="btn btn-primary" onclick="openCreateGroupModal()">

<!-- Modal: Créer groupe -->
<div class="modal-backdrop" id="group-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Créer un groupe</h2>
      <button class="modal-close" onclick="closeModal('group-modal')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="group-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="group-name">Nom du groupe <span class="required">*</span></label>
          <input type="text" id="group-name" class="form-input" placeholder="Ex: Équipe Réseau" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="group-desc">Description</label>
          <textarea id="group-desc" class="form-textarea" placeholder="Objectifs du groupe…" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Icône</label>
          <div class="emoji-picker-row" id="emoji-picker"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Couleur</label>
          <div class="color-picker-group" id="color-picker"></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('group-modal')">Annuler</button>
      <button class="btn btn-primary" id="group-submit-btn" data-loading-text="Création…" onclick="submitCreateGroup()">
        Créer le groupe
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@16/dist/iife/sdk.min.js"></script>
<script type="module">
  import { initTheme, toggleTheme } from './js/theme.js';
  import { requireAuth, populateSidebarUser, isAdmin, initLogoutBtn } from './js/auth.js';
  import { initSidebar, initHeaderSearch, showToast, openModal, closeModal, setButtonLoading, confirmDialog, renderMemberAvatar, renderEmptyState } from './js/ui.js';
  import { getMyWorkspaces, createWorkspace, deleteWorkspace } from './js/workspaces.js';
  import { getGroupTasks } from './js/tasks.js';
  import { hidePageLoader } from './js/ui.js';
  import { escapeHtml, stringToColor } from './js/utils.js';
  import { GROUP_EMOJIS, GROUP_COLORS } from './js/config.js';

  window.toggleThemePage = toggleTheme;
  window.closeModal = closeModal;

  let currentUser  = null;
  let allWorkspaces = [];
  let selectedEmoji = '💻';
  let selectedColor = '#2F81F7';

  async function init() {
    initTheme();
    initSidebar();
    initHeaderSearch();
    initLogoutBtn();
    currentUser = await requireAuth();
    if (!currentUser) return;
    populateSidebarUser(currentUser);
    buildEmojiPicker();
    buildColorPicker();
    await loadGroups();
    hidePageLoader();
  }

  async function loadGroups() {
    try {
      allWorkspaces = await getMyWorkspaces(currentUser.$id);
      renderGroups();
    } catch {
      showToast('Erreur lors du chargement des groupes', 'error');
    }
  }

  function renderGroups() {
    const grid = document.getElementById('groups-grid');
    if (!allWorkspaces.length) {
      grid.innerHTML = renderEmptyState('👥', 'Aucun groupe', 'Créez votre premier groupe de travail.', '+ Créer un groupe', 'openCreateGroupModal()');
      return;
    }
    grid.innerHTML = allWorkspaces.map(ws => renderGroupCard(ws)).join('');
  }

  function renderGroupCard(ws) {
    const isOwner = ws.created_by === currentUser.$id;
    const admin   = isAdmin(currentUser);
    const members = ws.members || [];
    const shown   = members.slice(0, 5);
    const extra   = members.length - shown.length;
    const avatarsHtml = shown.map(id => {
      const color = stringToColor(id);
      return `<div class="member-avatar" style="background:${color}">${id.slice(0,2).toUpperCase()}</div>`;
    }).join('') + (extra > 0 ? `<div class="member-avatar member-avatar-more">+${extra}</div>` : '');

    return `
      <div class="group-card" style="border-top:3px solid ${ws.color||'#2F81F7'}">
        <div class="group-card-header">
          <div class="group-icon" style="background:${ws.color||'#2F81F7'}22">${ws.icon||'💻'}</div>
          <div>
            <div class="group-card-name">${escapeHtml(ws.name)}</div>
            <div class="d-flex items-center gap-2 mt-1">
              ${isOwner ? '<span class="badge badge-owner">Owner</span>' : '<span class="badge badge-member">Membre</span>'}
            </div>
          </div>
        </div>
        ${ws.description ? `<div class="group-card-desc">${escapeHtml(ws.description)}</div>` : ''}
        <div class="group-card-footer">
          <div class="member-avatars">${avatarsHtml}</div>
          <div class="d-flex gap-2">
            ${isOwner || admin ? `
              <button class="btn btn-ghost btn-sm btn-icon" onclick="event.stopPropagation();deleteGroupUI('${ws.$id}','${escapeHtml(ws.name)}')" title="Supprimer">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </button>
            ` : ''}
            <a href="group-detail.html?id=${ws.$id}" class="btn btn-secondary btn-sm" onclick="event.stopPropagation()">Ouvrir</a>
          </div>
        </div>
      </div>
    `;
  }

  function buildEmojiPicker() {
    const picker = document.getElementById('emoji-picker');
    picker.innerHTML = GROUP_EMOJIS.map(e => `
      <button type="button" class="emoji-btn ${e===selectedEmoji?'selected':''}"
              onclick="selectEmoji('${e}',this)">${e}</button>
    `).join('');
  }

  function buildColorPicker() {
    const picker = document.getElementById('color-picker');
    picker.innerHTML = GROUP_COLORS.map(c => `
      <div class="color-swatch ${c===selectedColor?'selected':''}"
           style="background:${c}"
           onclick="selectColor('${c}',this)"></div>
    `).join('');
  }

  window.selectEmoji = (emoji, btn) => {
    selectedEmoji = emoji;
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  };

  window.selectColor = (color, swatch) => {
    selectedColor = color;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    swatch.classList.add('selected');
  };

  window.openCreateGroupModal = () => {
    document.getElementById('group-form').reset();
    selectedEmoji = '💻';
    selectedColor = '#2F81F7';
    buildEmojiPicker();
    buildColorPicker();
    openModal('group-modal');
  };

  window.submitCreateGroup = async () => {
    const name = document.getElementById('group-name').value.trim();
    if (!name) { showToast('Le nom du groupe est requis', 'error'); return; }

    const btn = document.getElementById('group-submit-btn');
    setButtonLoading(btn, true);
    try {
      await createWorkspace({
        name,
        description: document.getElementById('group-desc').value.trim(),
        color: selectedColor,
        icon : selectedEmoji,
      }, currentUser);
      closeModal('group-modal');
      showToast('Groupe créé avec succès', 'success');
      await loadGroups();
    } catch (err) {
      showToast(err?.message || 'Erreur lors de la création', 'error');
    } finally {
      setButtonLoading(btn, false);
    }
  };

  window.deleteGroupUI = (groupId, groupName) => {
    confirmDialog(
      `Supprimer le groupe "${groupName}" et toutes ses tâches ? Cette action est irréversible.`,
      async () => {
        try {
          await deleteWorkspace(groupId);
          allWorkspaces = allWorkspaces.filter(w => w.$id !== groupId);
          renderGroups();
          showToast('Groupe supprimé', 'success');
        } catch {
          showToast('Erreur lors de la suppression', 'error');
        }
      },
      'Supprimer le groupe'
    );
  };

  init();
</script>
</body>
