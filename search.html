<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT-ISMGB — Recherche</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/forms.css" />
  <style>
    .search-hero {
      padding: 2rem 0;
      text-align: center;
      max-width: 600px;
      margin: 0 auto 2rem;
    }
    .search-hero h1 { font-size: var(--text-2xl); margin-bottom: 1rem; }
    .result-section { margin-bottom: 2rem; }
    .result-section-title {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .result-section-count {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      padding: 0.1rem 0.4rem;
      border-radius: 999px;
      font-size: var(--text-xs);
    }
    .result-group-card {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      padding: 0.875rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: inherit;
      transition: all var(--transition);
      margin-bottom: 0.5rem;
    }
    .result-group-card:hover { border-color: var(--border-accent); box-shadow: var(--shadow-sm); }
    .result-group-icon { font-size: 1.25rem; }
    .result-group-name { font-size: var(--text-sm); font-weight: 600; }
    .result-group-desc { font-size: var(--text-xs); color: var(--text-secondary); }
    .no-results { text-align: center; padding: 3rem; color: var(--text-secondary); }
    .no-results svg { width: 48px; height: 48px; opacity: 0.3; margin: 0 auto 1rem; }
  </style>
</head>
<body>

<div id="page-loader" class="page-loader"><div class="spinner"></div></div>
<div id="toast-container" class="toast-container"></div>
<div id="sidebar-overlay" class="sidebar-overlay"></div>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <a href="my-tasks.html" class="sidebar-logo">
      <div class="sidebar-logo-icon"><svg viewBox="0 0 24 24" fill="white"><path d="M20 3H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1zm-1 12H5V5h14v10zm-2 4H7v2h10v-2z"/></svg></div>
      <div class="sidebar-logo-text"><span class="sidebar-logo-title">IT-ISMGB</span><span class="sidebar-logo-sub">Service Informatique</span></div>
    </a>
    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="sidebar-section-label">Principal</div>
        <a href="my-tasks.html" class="nav-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Mes tâches</a>
        <a href="groups.html" class="nav-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Mes groupes</a>
        <a href="search.html" class="nav-item active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Recherche</a>
      </div>
      <div class="sidebar-section" data-admin-only style="display:none">
        <div class="sidebar-section-label">Administration</div>
        <a href="dashboard.html" class="nav-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
        <a href="admin.html" class="nav-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Administration</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user-avatar" id="sidebar-user-avatar">?</div>
      <div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebar-user-name">…</div><div class="sidebar-user-role" id="sidebar-user-role">Membre</div></div>
      <button class="sidebar-logout" data-logout title="Déconnexion"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </aside>

  <div class="main-content">
    <header class="header">
      <button class="sidebar-toggle" id="sidebar-toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="header-breadcrumb"><span class="breadcrumb-item current">Recherche</span></div>
      <div class="header-actions">
        <button class="header-btn" onclick="toggleThemePage()" title="Thème">
          <span data-theme-icon="sun"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>
          <span data-theme-icon="moon" style="display:none"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
        </button>
        <div class="header-avatar" id="header-avatar">?</div>
      </div>
    </header>

    <main class="page-content">
      <div class="search-hero">
        <h1>Recherche globale</h1>
        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" id="search-input" placeholder="Rechercher une tâche, un groupe…" autofocus />
        </div>
      </div>

      <!-- Filters -->
      <div class="filters-bar mb-4">
        <span class="filter-label">Filtrer</span>
        <select id="f-status" onchange="doSearch()">
          <option value="">Tous statuts</option>
          <option value="todo">À faire</option>
          <option value="in_progress">En cours</option>
          <option value="blocked">Bloqué</option>
          <option value="done">Terminé</option>
        </select>
        <select id="f-category" onchange="doSearch()">
          <option value="">Toutes catégories</option>
          <option value="reseau">Réseau</option>
          <option value="materiel">Matériel</option>
          <option value="logiciel">Logiciel</option>
          <option value="maintenance">Maintenance</option>
          <option value="graphisme">Graphisme</option>
        </select>
      </div>

      <!-- Results -->
      <div id="search-results"></div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@16/dist/iife/sdk.min.js"></script>
<script type="module">
  import { initTheme, toggleTheme } from './js/theme.js';
  import { requireAuth, populateSidebarUser, initLogoutBtn } from './js/auth.js';
  import { initSidebar, showToast, renderTaskCard, renderCategoryBadge, renderStatusBadge } from './js/ui.js';
  import { globalSearch } from './js/search.js';
  import { hidePageLoader } from './js/ui.js';
  import { debounce, escapeHtml, highlight, getUrlParam, setUrlParam } from './js/utils.js';

  window.toggleThemePage = toggleTheme;

  let currentUser = null;

  async function init() {
    initTheme();
    initSidebar();
    initLogoutBtn();
    currentUser = await requireAuth();
    if (!currentUser) return;
    populateSidebarUser(currentUser);
    hidePageLoader();

    const q = getUrlParam('q');
    if (q) {
      document.getElementById('search-input').value = q;
      runSearch(q);
    }

    document.getElementById('search-input').addEventListener('input', debounce(e => {
      const q = e.target.value.trim();
      setUrlParam('q', q);
      if (q.length >= 2) runSearch(q);
      else document.getElementById('search-results').innerHTML = '';
    }, 300));
  }

  window.doSearch = () => {
    const q = document.getElementById('search-input').value.trim();
    if (q.length >= 2) runSearch(q);
  };

  async function runSearch(q) {
    const resultsEl = document.getElementById('search-results');
    resultsEl.innerHTML = '<div class="d-flex justify-center p-4"><div class="spinner"></div></div>';

    try {
      const filters = {
        status  : document.getElementById('f-status').value,
        category: document.getElementById('f-category').value,
      };
      const { tasks, workspaces } = await globalSearch(q, currentUser.$id, filters);
      renderResults(tasks, workspaces, q);
    } catch {
      resultsEl.innerHTML = '<p class="text-secondary p-4">Erreur lors de la recherche.</p>';
    }
  }

  function renderResults(tasks, workspaces, q) {
    const el = document.getElementById('search-results');

    if (!tasks.length && !workspaces.length) {
      el.innerHTML = `
        <div class="no-results">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <p class="text-secondary">Aucun résultat pour "<strong>${escapeHtml(q)}</strong>"</p>
        </div>`;
      return;
    }

    let html = '';

    if (tasks.length) {
      html += `<div class="result-section">
        <div class="result-section-title">
          Tâches <span class="result-section-count">${tasks.length}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:0.5rem">
          ${tasks.map(t => {
            const ht = highlight(t.title, q);
            return `<div class="task-card cat-${t.category}" onclick="window.location.href='task-detail.html?id=${t.$id}'" style="cursor:pointer">
              <div class="task-card-top">
                <div class="task-card-badges">${renderCategoryBadge(t.category)}</div>
                <span class="task-card-title">${ht}</span>
              </div>
              <div class="task-card-meta">
                ${renderStatusBadge(t.status)}
                ${t.description ? `<span class="text-xs text-secondary">${highlight(t.description.slice(0,80),q)}…</span>` : ''}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }

    if (workspaces.length) {
      html += `<div class="result-section">
        <div class="result-section-title">
          Groupes <span class="result-section-count">${workspaces.length}</span>
        </div>
        ${workspaces.map(ws => `
          <a href="group-detail.html?id=${ws.$id}" class="result-group-card">
            <div class="result-group-icon">${ws.icon||'💻'}</div>
            <div>
              <div class="result-group-name">${highlight(ws.name, q)}</div>
              ${ws.description ? `<div class="result-group-desc">${highlight(ws.description.slice(0,80), q)}</div>` : ''}
            </div>
            <div class="badge badge-member" style="margin-left:auto">${ws.members?.length||0} membres</div>
          </a>
        `).join('')}
      </div>`;
    }

    el.innerHTML = html;
  }

  init();
</script>
</body>
</html>
